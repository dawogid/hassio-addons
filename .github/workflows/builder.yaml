name: Builder

env:
  BUILD_ARGS: "--test"
  MONITORED_FILES: "build.yaml config.yaml Dockerfile rootfs"

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:  # manual trigger option

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      addons: ${{ steps.addons_json.outputs.addons }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4.2.0

      - name: Find add-on directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Convert addons list to JSON safely
        id: addons_json
        run: |
          # Split space-separated list into array
          addons=(${{ steps.addons.outputs.addons }})
          # Convert array to JSON
          json=$(printf '%s\n' "${addons[@]}" | jq -R . | jq -s .)
          echo "addons<<EOF" >> $GITHUB_OUTPUT
          echo "$json" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Converted addons: $json"

  build:
    needs: init
    runs-on: ubuntu-latest
    name: Build ${{ matrix.addon }} add-on
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.init.outputs.addons) }}
        arch: ["aarch64", "amd64", "armv7"]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.0

      - name: Get add-on information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"

      - name: Determine supported architectures and build
        id: check
        shell: bash
        run: |
          image="${{ steps.info.outputs.image }}"
          archs="${{ steps.info.outputs.architectures }}"
          addon="${{ matrix.addon }}"
          matrix_arch="${{ matrix.arch }}"

          echo "DEBUG: image='$image'"
          echo "DEBUG: archs='$archs'"
          echo "DEBUG: addon='$addon'"
          echo "DEBUG: matrix_arch='$matrix_arch'"

          # Skip if no image defined
          if [[ -z "$image" || "$image" == "null" ]]; then
            echo "No image defined for $addon, skipping"
            echo "build_arch=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Only build if the matrix architecture is supported
          if [[ "$archs" =~ "$matrix_arch" ]]; then
            echo "matrix_arch $matrix_arch is supported for $addon"
            echo "build_arch=true" >> $GITHUB_OUTPUT
            img_name=$(echo "$image" | cut -d'/' -f3)
            echo "image=$img_name" >> $GITHUB_OUTPUT

            # Clear BUILD_ARGS on push
            if [[ -z "${GITHUB_HEAD_REF}" ]] && [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
              echo "BUILD_ARGS=" >> $GITHUB_ENV
            fi
          else
            echo "matrix_arch $matrix_arch is NOT supported for $addon, skipping"
            echo "build_arch=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        if: steps.check.outputs.build_arch == 'true' && env.BUILD_ARGS != '--test'
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.addon }} add-on
        if: steps.check.outputs.build_arch == 'true'
        uses: home-assistant/builder@2024.08.2
        with:
          args: |
            ${{ env.BUILD_ARGS }} \
            --${{ matrix.arch }} \
            --target /data/${{ matrix.addon }} \
            --image "${{ steps.check.outputs.image }}" \
            --docker-hub "ghcr.io/${{ github.repository_owner }}" \
            --addon
